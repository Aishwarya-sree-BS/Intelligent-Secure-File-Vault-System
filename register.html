<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Secure File Vault</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            background-color:#f8f9fa;
        }

        .register-card{
            max-width:500px;
            margin:auto;
            margin-top:50px;
            margin-bottom:50px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card shadow register-card">

        <div class="card-body p-4">

            <div class="text-center mb-4">

                <i class="bi bi-person-plus-fill text-primary"
                   style="font-size:60px;"></i>

                <h3 class="mt-2">
                    User Registration
                </h3>

                <p class="text-muted">
                    Intelligent Secure File Vault System
                </p>

            </div>

            <form method="POST">

                <!-- Username -->

                <div class="mb-3">

                    <label class="form-label">
                        Username
                    </label>

                    <input type="text"
                           class="form-control"
                           name="username"
                           placeholder="Enter Username"
                           required>

                </div>

                <!-- Email -->

                <div class="mb-3">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input type="email"
                           class="form-control"
                           name="email"
                           placeholder="Enter Email"
                           required>

                </div>

                <!-- Department -->

                <div class="mb-3">

                    <label class="form-label">
                        Department
                    </label>

                    <select class="form-select"
                            name="department"
                            required>

                        <option value="">
                            Select Department
                        </option>

                        <option>
                            Computer Science
                        </option>

                        <option>
                            Information Technology
                        </option>

                        <option>
                            Cyber Security
                        </option>

                        <option>
                            Electronics and Communication
                        </option>

                        <option>
                            Mechanical Engineering
                        </option>

                        <option>
                            Civil Engineering
                        </option>

                    </select>

                </div>


                <!-- College name -->

                <div class="mb-3">
                    <label class="form-label">
                        College Name
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="college_name"
                    required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        College Code
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="college_code"
                        required>
                </div>

                <!-- Password -->

                <div class="mb-3">

                    <label class="form-label">
                        Password
                    </label>

                    <div class="input-group">

                        <input type="password"
                               class="form-control"
                               id="password"
                               name="password"
                               placeholder="Minimum 8 Characters"
                               minlength="8"
                               required>

                        <div id="passwordStrength"
                            class="small mt-2">
                        </div>

                        <button type="button"
                                class="btn btn-outline-secondary"
                                onclick="togglePassword()">

                            <i class="bi bi-eye"></i>

                        </button>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Confirm Password

                    </label>

                    <input
                        type="password"
                        class="form-control"
                        name="confirm_password"
                    required>

                </div>

                <!-- Register Button -->

                <button type="submit"
                        class="btn btn-primary w-100">

                    Register

                </button>

            </form>

            <div class="text-center mt-3">

                Already have an account?

                <a href="/login">
                    Login
                </a>

            </div>

            <div class="text-center mt-2">

                <a href="/">
                    Back to Home
                </a>

            </div>

        </div>

    </div>

</div>

<script>

function togglePassword() {

    var password =
        document.getElementById("password");

    if(password.type === "password"){
        password.type = "text";
    }
    else{
        password.type = "password";
    }
}

</script>

<script>

const password =
document.querySelector(
'input[name="password"]'
);

const strength =
document.getElementById(
'passwordStrength'
);

password.addEventListener(
'keyup',
function(){

let value=password.value;

let score=0;

if(value.length>=8) score++;

if(/[A-Z]/.test(value)) score++;

if(/[0-9]/.test(value)) score++;

if(/[!@#$%^&*]/.test(value))
score++;

if(score<=1){

strength.innerHTML=
"🔴 Weak Password";

}

else if(score<=3){

strength.innerHTML=
"🟡 Medium Password";

}

else{

strength.innerHTML=
"🟢 Strong Password";

}

});

</script>

</body>
</html>
