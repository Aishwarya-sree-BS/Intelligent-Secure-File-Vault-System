<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fc;
        }

        .profile-card {
            border-radius: 20px;
            overflow: hidden;
        }

        .profile-header {
            background: linear-gradient(135deg, #0d6efd, #4f8cff);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: white;
            color: #0d6efd;
            font-size: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            margin-bottom: 15px;
        }

        .info-label {
            font-weight: 600;
            color: #555;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-update {
            border-radius: 10px;
            padding: 10px;
            font-weight: bold;
        }

        .readonly-box {
            background: #eef2f7;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="card shadow-lg profile-card">

        <div class="profile-header">

            <div class="profile-avatar">
                {{ user[0][0]|upper }}
            </div>

            <h3>{{ user[0] }}</h3>
            <p class="mb-0">{{ user[1] }}</p>

        </div>

        <div class="card-body p-4">

            <form method="POST">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="info-label">Username</label>
                        <input type="text"
                               name="username"
                               class="form-control"
                               value="{{ user[0] }}"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="info-label">Email</label>
                        <input type="email"
                               name="email"
                               class="form-control"
                               value="{{ user[1] }}"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="info-label">Department</label>
                        <input type="text"
                               class="form-control readonly-box"
                               value="{{ user[2] }}"
                               readonly>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="info-label">Role</label>
                        <input type="text"
                               class="form-control readonly-box"
                               value="{{ user[3] }}"
                               readonly>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="info-label">College Name</label>
                        <input type="text"
                               class="form-control readonly-box"
                               value="{{ user[4] }}"
                               readonly>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="info-label">College Code</label>
                        <input type="text"
                               class="form-control readonly-box"
                               value="{{ user[5] }}"
                               readonly>
                    </div>

                    <div class="col-md-12 mb-4">
                        <label class="info-label">Status</label>
                        <input type="text"
                               class="form-control readonly-box"
                               value="{{ user[6] }}"
                               readonly>
                    </div>

                    <hr>

                    <h4>Security Settings</h4>

                    <div class="mb-3">
                    <label>Current Password</label>
                    <input type="password"
                        name="current_password"
                    class="form-control">
                    </div>

                    <div class="mb-3">
                    <label>New Password</label>
                    <input type="password"
                        name="new_password"
                        class="form-control">
                    </div>

                    <div class="mb-3">
                    <label>Confirm Password</label>
                    <input type="password"
                        name="confirm_password"
                        class="form-control">
                    </div>

                </div>
                
                <button type="submit"
                        class="btn btn-primary btn-update w-100">
                    Update Profile
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
